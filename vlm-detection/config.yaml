# VLM-Detection 推理配置（仅检测，不训练）

models:
  worker: "E:/China Oversea  Final/VLM Detection/weights/worker/yolo26x_worker.pt"
  machinery: "E:/China Oversea  Final/VLM Detection/weights/machinery/yolo26l_machinery.pt"

inference:
  imgsz: 640
  conf: 0.25
  device: ""  # 空=自动；cpu / 0 / 0,1

