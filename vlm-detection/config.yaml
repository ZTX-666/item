  - 0   # Hardhat
  - 2   # NO-Hardhat
  - 7   # Safety Vest
  - 4   # NO-Safety Vest
  - 1   # Mask
  - 3   # NO-Mask

worker_class_names:
  0: Hardhat
  1: Mask
  2: NO-Hardhat
  3: NO-Mask
  4: NO-Safety Vest
  5: Person
  6: Safety Cone
  7: Safety Vest
  8: machinery
  9: utility pole
  10: vehicle

machinery_class_names:
  0: excavator
  1: dump_truck
  2: bulldozer
  3: wheel_loader
  4: mobile_crane
  5: tower_crane
  6: roller_compactor
