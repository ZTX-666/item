# 工地人+机械统一检测（单模型、单张合并标注图）

mode: unified

models:
  unified: weights/unified/yolo26x_unified.pt
  worker: weights/unified/yolo26x_unified.pt
  machinery: weights/machinery/yolo26l_machinery.pt

inference:
  imgsz: 640
  conf: 0.25
  device: ""

unified:
  classes: [5, 8, 10]
  person_class_ids: [5]
  machinery_class_ids: [8, 10]

output:
  vlm_image: combined

worker_class_names:
  0: Hardhat
  1: Mask
  2: NO-Hardhat
  3: NO-Mask
  4: NO-Safety Vest
  5: Person
  6: Safety Cone
  7: Safety Vest
  8: machinery
  9: utility pole
  10: vehicle

machinery_class_names:
  0: excavator
  1: dump_truck
  2: bulldozer
  3: wheel_loader
  4: mobile_crane
  5: tower_crane
  6: roller_compactor
  7: cement_mixer
