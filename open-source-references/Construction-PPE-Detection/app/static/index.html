<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Construction PPE Detection</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-dark text-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-black px-4 py-2 d-flex justify-content-between align-items-center">
    <span class="navbar-brand mb-0 h5 fw-bold">&#9746; PPE Detection</span>
    <span id="health-badge" class="badge bg-secondary">Connecting…</span>
  </nav>

  <div class="container-fluid mt-3 px-4">
    <div class="row g-3">

      <!-- Left: Live feed + controls -->
      <div class="col-lg-7">
        <div class="card bg-black border-secondary">
          <div class="card-header d-flex align-items-center justify-content-between">
            <span class="fw-semibold">Live Feed</span>
            <div class="d-flex gap-2 align-items-center">
              <select id="camera-select" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:auto">
                <option value="">— Select camera —</option>
              </select>
              <button id="btn-start" class="btn btn-sm btn-success" disabled>Start</button>
              <button id="btn-stop"  class="btn btn-sm btn-danger"   disabled>Stop</button>
            </div>
          </div>
          <div class="card-body p-0 position-relative" style="background:#111;min-height:360px">
            <img id="stream-img" src="" alt="stream" class="w-100 d-none" style="max-height:480px;object-fit:contain" />
            <div id="stream-placeholder" class="d-flex align-items-center justify-content-center" style="height:360px;color:#555">
              <span>Select and start a camera to view the live feed</span>
            </div>
          </div>
          <div class="card-footer d-flex gap-4">
            <span>Hardhats: <strong id="cnt-hardhat">—</strong></span>
            <span>Safety Vests: <strong id="cnt-vest">—</strong></span>
            <span>People: <strong id="cnt-person">—</strong></span>
          </div>
        </div>

        <!-- Add camera form -->
        <div class="card bg-black border-secondary mt-3">
          <div class="card-header fw-semibold">Add Camera</div>
          <div class="card-body">
            <form id="add-camera-form" class="row g-2">
              <div class="col-md-4">
                <input type="text" id="cam-name" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Name" required />
              </div>
              <div class="col-md-3">
                <select id="cam-type" class="form-select form-select-sm bg-dark text-light border-secondary">
                  <option value="webcam">Webcam</option>
                  <option value="rtsp">RTSP</option>
                  <option value="file">Video File</option>
                </select>
              </div>
              <div class="col-md-3">
                <input type="text" id="cam-uri" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="URI / index / path" required />
              </div>
              <div class="col-md-2">
                <button type="submit" class="btn btn-sm btn-primary w-100">Add</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Right: Violations log -->
      <div class="col-lg-5">
        <div class="card bg-black border-secondary h-100">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">Recent Violations</span>
            <a id="btn-export" href="/api/v1/violations/export" class="btn btn-sm btn-outline-light">Export CSV</a>
          </div>
          <div class="card-body p-0" style="overflow-y:auto;max-height:560px">
            <table class="table table-sm table-dark table-hover mb-0">
              <thead class="sticky-top bg-black">
                <tr>
                  <th>Time</th>
                  <th>Camera</th>
                  <th>Type</th>
                  <th>Conf</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="violations-tbody">
                <tr id="no-violations-row">
                  <td colspan="5" class="text-center text-muted py-4">No violations recorded</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Frame modal -->
  <div class="modal fade" id="frameModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content bg-dark border-secondary">
        <div class="modal-header border-secondary">
          <h6 class="modal-title">Violation Frame</h6>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <img id="modal-frame-img" src="" alt="frame" class="img-fluid rounded" />
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
