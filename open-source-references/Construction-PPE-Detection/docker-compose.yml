version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+asyncpg://ppe:ppe@db:5432/ppe_detection
      MODEL_PATH: Model/ppe.pt
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - violation_frames:/app/violation_frames
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ppe
      POSTGRES_PASSWORD: ppe
      POSTGRES_DB: ppe_detection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppe -d ppe_detection"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  violation_frames:
